<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Project</title>
  </head>
  <body>

    <main id="container"></main>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      function ChatInput() {
        return (
          <div>
            <input
              placeholder="Send a message to Chatbot"
              size="30"
            />
            <button>Send</button>
          </div>
        );
      };

      function ChatMessage({ message, sender }) {
        return (
          <div>
            {sender === 'robot' && (
              <img src="./assets/robot.png" width="50" />
            )}
            {message}
            {sender === 'user' && (
              <img src="./assets/user.png" width="50" />
            )}
          </div>
        );
      };

      function App() {

        const chatMessages = [{
            message: 'Hello Chatbot!',
            sender: 'user',
            id: '001'
          }, {
            message: 'Hello! How can i help you?',
            sender: 'robot',
            id: '002'
          }, {
            message: 'Can you get my today date?',
            sender: 'user',
            id: '003'
          }, {
            message: 'Today is setember 27.',
            sender: 'robot',
            id: '004'
          }];

        const chatMessageComponent = chatMessages.map(chatMessage => {
          return (
            <ChatMessage
              message={chatMessage.message}
              sender={chatMessage.sender}
              key={chatMessage.id}
            />
          )
        });

        return (
          <>
            <ChatInput/>
            {chatMessageComponent}
          </>
        );
      };

      const container = document.querySelector('#container');
      ReactDOM.createRoot(container).render(<App />);

    </script>

  </body>
</html>
